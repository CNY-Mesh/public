<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CNYmesh Coverage Map</title>
  <meta name="description" content="Responsive embedded coverage map for CNYmesh, optimized for mobile, tablet, and desktop viewing." />
  <link rel="stylesheet" href="css/site.css">
  <link rel="icon" href="favicon.ico" />
  <meta property="og:title" content="CNYmesh Coverage Map" />
  <meta property="og:description" content="Responsive embedded map showing CNYmesh network coverage across Central New York." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cnymesh.org/map.html" />
  <link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="shortcut icon" href="/img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="CNYmesh" />
  <link rel="manifest" href="/img/site.webmanifest" />
  <style>
    html, body {
      min-height: 100%;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: clamp(0.5rem, 1vw, 1rem);
      box-sizing: border-box;
    }
    .map-embed-shell {
      flex: 1;
      display: flex;
      min-width: 0;
      min-height: 0;
      width: 100%;
    }
    .map-embed-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-height: calc(100dvh - 9.5rem);
      border: 0;
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }
    .map-embed-note {
      margin: 0;
      color: var(--muted-text-color, var(--text-color));
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .map-embed-note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.15em;
    }
    @media (max-width: 768px) {
      #content {
        padding: 0;
        gap: 0.5rem;
      }
      .map-embed-frame {
        min-height: calc(100dvh - 11rem);
        border-radius: 0;
      }
      .map-embed-note {
        font-size: 0.9rem;
        padding: 0 0.75rem;
      }
    }
    @media (min-width: 1024px) {
      .map-embed-shell {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="container">
    <a class="brand" href="/" aria-label="CNYmesh Home">
      <span class="brand-mark">CNY</span><span class="brand-mark accent">mesh</span>
    </a>
    <button class="mobile-menu-btn" aria-label="Toggle mobile menu" aria-expanded="false">
      <span id="mobile-menu-icon">☰</span>
    </button>
    <nav class="main-nav" aria-label="Primary">
      <a href="/#about">About</a>
      <a href="/#join">How to Join</a>
      <a href="/#resources">Technical</a>
      <a href="/links-resources.html">Links & Resources</a>
      <a href="/#involved">Get Involved</a>
      <a class="btn btn-small" href="/faq.html">FAQ</a>
    </nav>
  </div>
</header>

<main id="content">
  <div class="map-embed-shell">
    <iframe
      class="map-embed-frame"
      src="https://data.cnymesh.org/?r=map_embed"
      title="CNYmesh embedded coverage map"
      width="100%"
      height="100%"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      allowfullscreen
    ></iframe>
  </div>
  <p class="map-embed-note">
    Map data from MQTT data only, may not include all nodes in the area. See more info on the CNYMesh data dashboard at <a href="https://data.cnymesh.org" target="_blank" rel="noopener noreferrer">data.cnymesh.org</a>.
  </p>
</main>

<div class="disclaimer">
  <div class="container">
    <p>CNYmesh is not affiliated with Meshtastic®, nor endorsed by Meshtastic LLC.</p>
  </div>
</div>

<script src="js/dark-mode.js" defer></script>
<script src="js/mobile-menu.js"></script>
</body>
</html>
